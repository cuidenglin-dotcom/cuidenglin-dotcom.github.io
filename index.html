<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人网站</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f5f7fb;
      color: #1b2430;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 28px;
      color: #5c6675;
      font-size: 16px;
      line-height: 1.7;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 76px;
      padding: 18px 20px;
      color: inherit;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #dce3ee;
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(36, 48, 72, 0.08);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      border-color: #6b8afd;
      box-shadow: 0 16px 36px rgba(36, 48, 72, 0.12);
      outline: none;
    }

    .title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.35;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      body {
        align-items: start;
        padding-top: 52px;
      }

      a {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }

      .meta {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>个人网站</h1>
    <p>这里收纳一些可直接打开的小工具和页面。</p>

    <nav class="links" aria-label="站点页面">
      <a href="./pages/doraemon-game-mobile.html">
        <span class="title">机器猫小游戏（手机）</span>
        <span class="meta">打开游戏</span>
      </a>
      <a href="./pages/shenhuo-valuation.html">
        <span class="title">神火股份估值</span>
        <span class="meta">查看模型</span>
      </a>
    </nav>
  </main>
</body>
</html>
